name: "mutation tests"

on:
  pull_request: ~
  push: ~

jobs:
  mutation-tests:
    name: "mutation tests"
    runs-on: "ubuntu-latest"
    steps:
      - name: "checkout"
        uses: "actions/checkout@v3"

      - name: setup
        uses: ./.github/actions/setup
        with:
          php: "8.1"
          os: "ubuntu-latest"

      - name: "running mutation tests"
        run: make mutation-tests
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
